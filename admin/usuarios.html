<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usuários - ST Admin</title>

<style>
body{background:#0b0b0b;color:white;font-family:Arial,sans-serif;padding:20px}
h1,h2{color:#d4af37}
a{color:#d4af37;text-decoration:none}
.card,.usuario{background:#151515;border:1px solid #d4af37;padding:15px;border-radius:10px;margin-bottom:15px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:20px 0}
.numero{font-size:28px;font-weight:900;color:#d4af37}
input{width:100%;padding:12px;background:#222;border:1px solid #d4af37;color:white;border-radius:8px;margin-bottom:15px}
.online{color:#00ff88;font-weight:bold}
.offline{color:#ff5555;font-weight:bold}
</style>
</head>

<body>

<a href="dashboard.html">⬅ Voltar ao Dashboard</a>

<h1>👥 Usuários</h1>

<input placeholder="🔍 Buscar usuário">

<div class="stats">
<div class="card"><div class="numero">0</div>Online agora</div>
<div class="card"><div class="numero">0</div>Total de clientes</div>
<div class="card"><div class="numero">0</div>Novos hoje</div>
</div>

<h2>Usuários recentes</h2>

<div class="usuario">
<b>Cliente exemplo</b><br>
Último acesso: aguardando dados reais<br>
<span class="offline">● Offline</span>
</div>

</body>
</html>
