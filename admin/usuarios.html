<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Usuários - ST Admin</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1,h2{
color:#d4af37;
}

a{
color:#d4af37;
text-decoration:none;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin:20px 0;
}

.card{
background:#151515;
border:1px solid #d4af37;
padding:15px;
border-radius:10px;
}

.numero{
font-size:28px;
font-weight:bold;
color:#d4af37;
}

.usuario{
background:#151515;
border:1px solid #d4af37;
padding:15px;
border-radius:10px;
margin-bottom:12px;
}

.status{
color:#00ff88;
font-weight:bold;
}

.offline{
color:#ff5555;
font-weight:bold;
}
</style>
</head>
<body>

<a href="dashboard.html">⬅ Voltar ao Dashboard</a>

<h1>👥 Usuários</h1>

</div>
