<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ST Admin Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login{
width:95%;
max-width:400px;
background:#151515;
border:1px solid #d4af37;
padding:30px;
border-radius:12px;
}

.logo{
text-align:center;
font-size:30px;
font-weight:900;
color:#d4af37;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
background:#222;
border:1px solid #d4af37;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:#d4af37;
border:0;
font-weight:900;
cursor:pointer;
border-radius:8px;
}

.erro{
margin-top:10px;
color:#ff5555;
text-align:center;
}
</style>
</head>

<body>

<div class="login">

<div class="logo">
👑 ST ADMIN
</div>

<input
type="password"
id="senha"
placeholder="Senha do painel">

<button onclick="entrar()">
Entrar
</button>

<div id="erro" class="erro"></div>

</div>

<script>

function entrar(){

const senha = localStorage.getItem("st_admin_senha") || "1234";

if(document.getElementById("senha").value === senha){

window.location.href="dashboard.html";

}else{

document.getElementById("erro").innerHTML =
"Senha incorreta";

}

}

</script>

</body>
</html>
