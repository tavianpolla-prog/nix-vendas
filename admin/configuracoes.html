<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Configurações - ST Admin</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1,h2{
color:#d4af37;
}

a{
color:#d4af37;
text-decoration:none;
}

.card{
background:#151515;
border:1px solid #d4af37;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:8px;
background:#222;
border:1px solid #d4af37;
color:white;
border-radius:8px;
}

button{
background:#d4af37;
color:black;
border:0;
padding:12px;
margin-top:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<a href="dashboard.html">⬅ Voltar ao Dashboard</a>

<h1>🔐 Configurações</h1>

<div class="card">
<h2>Alterar senha do admin</h2>

<input id="novaSenha" type="password" placeholder="Nova senha">

<button onclick="alterarSenha()">
Salvar nova senha
</button>
</div>

<div class="card">
<h2>Nome do painel</h2>

<input id="nomePainel" placeholder="ST ADMIN">

<button>
Salvar nome
</button>
</div>

<div class="card">
<h2>Tema do painel</h2>

<select>
<option>Preto e Dourado VIP</option>
<option>Azul e Branco</option>
<option>Roxo Streaming</option>
</select>

<button>
Salvar tema
</button>
</div>

<script>
function alterarSenha(){
let senha = document.getElementById("novaSenha").value;

if(!senha){
alert("Digite uma nova senha.");
return;
}

localStorage.setItem("st_admin_senha", senha);
alert("Senha alterada com sucesso!");
}
</script>

</body>
</html>
