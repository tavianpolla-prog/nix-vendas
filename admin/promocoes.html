<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Promoções - ST Admin</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1,h2{
color:#d4af37;
}

a{
color:#d4af37;
text-decoration:none;
}

.card{
background:#151515;
border:1px solid #d4af37;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
background:#222;
border:1px solid #d4af37;
color:white;
border-radius:8px;
}

button{
background:#d4af37;
color:black;
border:0;
padding:12px;
margin-top:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-right:5px;
}

.excluir{
background:#dc3545;
color:white;
}

.banner{
background:linear-gradient(90deg,#d4af37,#f7d774);
color:black;
padding:15px;
border-radius:10px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<a href="dashboard.html">⬅ Voltar ao Dashboard</a>

<h1>📢 Promoções</h1>

<div class="card">

<h2>Nova Promoção</h2>

<input id="titulo" placeholder="Título da promoção">

<textarea id="descricao" placeholder="Descrição da promoção"></textarea>

<input id="validade" type="date">

<button onclick="criarPromo()">Criar Promoção</button>

</div>

<div class="card">

<h2>Pré-visualização</h2>

<div class="banner" id="preview">
🔥 Sua promoção aparecerá aqui
</div>

</div>

<div class="card">

<h2>Promoções Ativas</h2>

<div id="listaPromocoes">

<div class="banner">
🎉 Netflix Premium<br>
20% OFF até domingo
</div>

<button>Editar</button>
<button>Desativar</button>
<button class="excluir">Excluir</button>

</div>

</div>

<script>

function criarPromo(){

const titulo =
document.getElementById("titulo").value;

const descricao =
document.getElementById("descricao").value;

const validade =
document.getElementById("validade").value;

if(!titulo){
alert("Digite um título.");
return;
}

document.getElementById("preview").innerHTML =
`🔥 ${titulo}<br>${descricao}<br>Válida até ${validade}`;

alert("Promoção criada com sucesso!");

}

</script>

</body>
</html>
