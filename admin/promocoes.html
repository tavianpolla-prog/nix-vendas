<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Promoções - ST Admin</title>

<style>
body{
background:#0b0b0b;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

h1,h2{
color:#d4af37;
}

a{
color:#d4af37;
text-decoration:none;
}

.card{
background:#151515;
border:1px solid #d4af37;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:8px;
background:#222;
border:1px solid #d4af37;
color:white;
border-radius:8px;
}

button{
background:#d4af37;
color:black;
border:0;
padding:12px;
margin-top:10px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.banner{
background:linear-gradient(90deg,#d4af37,#f7d774);
color:black;
padding:15px;
border-radius:10px;
font-weight:bold;
margin-top:15px;
}
</style>
</head>
<body>

<a href="dashboard.html">⬅ Voltar ao Dashboard</a>

<h1>📢 Promoções</h1>

<div class="card">

<h2>Nova Promoção</h2>

<input placeholder="Título da promoção">

<textarea placeholder="Descrição da promoção"></textarea>

<input type="date">

<button>Salvar Promoção</button>

</div>

<div class="card">

<h2>Pré-visualização</h2>

<div class="banner">
🔥 Netflix por R$ 7,99<br>
Promoção válida até domingo.
</div>

</div>

<div class="card">

<h2>Promoções Ativas</h2>

<div class="banner">
🎉 Combo Streaming<br>
20% OFF em compras acima de R$ 30.
</div>

<button>Editar</button>
<button>Desativar</button>

</div>

</body>
</html>
