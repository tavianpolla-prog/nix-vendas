<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat - ST Admin</title>

<style>
body{background:#0b0b0b;color:white;font-family:Arial;padding:20px}
h1,h2{color:#d4af37}
a{color:#d4af37;text-decoration:none}
.container{display:grid;grid-template-columns:1fr 2fr;gap:15px;margin-top:20px}
.card,.chatbox{background:#151515;border:1px solid #d4af37;border-radius:10px;padding:15px}
.cliente{padding:12px;border-bottom:1px solid #333;cursor:pointer}
.cliente:hover{background:#222}
.mensagens{height:300px;overflow:auto;background:#0f0f0f;padding:12px;border-radius:8px;margin:15px 0}
.msg{background:#222;padding:10px;border-radius:8px;margin-bottom:8px}
.admin{background:#3b2f0b}
input,textarea{width:100%;padding:12px;background:#222;border:1px solid #d4af37;color:white;border-radius:8px;margin-top:8px}
button{background:#d4af37;color:black;border:0;padding:10px 14px;border-radius:6px;font-weight:bold;margin:5px 3px 0 0}
.fechar{background:#dc3545;color:white}
.rapida{background:#222;color:#d4af37;border:1px solid #d4af37}
@media(max-width:700px){.container{grid-template-columns:1fr}}
</style>
</head>

<body>

<a href="dashboard.html">⬅ Voltar ao Dashboard</a>

<h1>💬 Chat de Atendimento</h1>

<div class="container">

<div class="card">
<h2>Atendimentos</h2>

<div class="cliente" onclick="abrirChat('João Silva','Netflix')">
<b>João Silva</b><br>
Netflix<br>
Status: Pagamento confirmado
</div>

<div class="cliente" onclick="abrirChat('Maria Souza','Discord')">
<b>Maria Souza</b><br>
Discord<br>
Status: Processando
</div>

</div>

<div class="chatbox">
<h2 id="tituloChat">Selecione um atendimento</h2>

<div class="mensagens" id="mensagens">
<div class="msg">Selecione um cliente para iniciar o atendimento.</div>
</div>

<h3>🤖 Respostas rápidas</h3>

<button class="rapida" onclick="respostaRapida('✅ Pagamento confirmado. Um atendente irá iniciar seu atendimento em breve.')">Pagamento confirmado</button>

<button class="rapida" onclick="respostaRapida('⏳ Aguarde um instante, estamos preparando seu pedido.')">Aguarde</button>

<button class="rapida" onclick="respostaRapida('🔑 Acesso enviado. Verifique as informações encaminhadas.')">Acesso enviado</button>

<button class="rapida" onclick="respostaRapida('✅ Pedido concluído. Obrigado pela compra!')">Pedido concluído</button>

<textarea id="textoMsg" placeholder="Digite sua resposta..."></textarea>

<button onclick="enviarMensagem()">Enviar</button>
<button class="fechar" onclick="fecharChat()">Fechar atendimento</button>

</div>

</div>

<script>
let clienteAtual="";

function abrirChat(nome,produto){
clienteAtual=nome;
document.getElementById("tituloChat").innerText="Atendimento: "+nome+" | "+produto;
document.getElementById("mensagens").innerHTML=
'<div class="msg"><b>Sistema:</b> Chat iniciado para '+nome+'.</div>'+
'<div class="msg"><b>Cliente:</b> Olá, já fiz o Pix.</div>';
}

function enviarMensagem(){
let texto=document.getElementById("textoMsg").value;
if(!texto)return;
document.getElementById("mensagens").innerHTML+=
'<div class="msg admin"><b>Admin:</b> '+texto+'</div>';
document.getElementById("textoMsg").value="";
}

function respostaRapida(texto){
document.getElementById("textoMsg").value=texto;
}

function fecharChat(){
if(!clienteAtual){alert("Selecione um atendimento.");return}
document.getElementById("mensagens").innerHTML+=
'<div class="msg admin"><b>Sistema:</b> Atendimento fechado.</div>';
alert("Atendimento fechado!");
}
</script>

</body>
</html>
