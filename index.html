<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUSSHOP | Plataforma Premium</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --secondary: #ec4899;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); padding-top: 70px; overflow-x: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); display: flex; justify-content: space-between; align-items: center; padding: 0 5%; z-index: 1000; }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .nav-actions { display: flex; align-items: center; gap: 20px; }
        .icon-btn { background: none; border: none; color: var(--text-main); font-size: 18px; cursor: pointer; position: relative; }
        .badge { position: absolute; top: -8px; right: -10px; background-color: var(--secondary); color: white; font-size: 11px; padding: 2px 6px; border-radius: 50px; font-weight: bold; }
        .hero { padding: 60px 5% 80px 5%; text-align: center; }
        .hero h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 20px; }
        .hero h1 span { background: linear-gradient(45deg, #38bdf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto 30px auto; }
        .products-section { padding: 40px 5%; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 30px; }
        .product-card { background: var(--bg-card); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.05); padding: 20px; display: flex; flex-direction: column; }
        .product-title { font-size: 18px; font-weight: 600; margin: 10px 0; }
        .product-price { font-size: 20px; font-weight: 700; margin-bottom: 15px; }
        .btn-buy { width: 100%; background: var(--primary); border: none; color: white; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        .cart-sidebar { position: fixed; top: 0; right: -400px; width: 100%; max-width: 400px; height: 100vh; background: #111827; border-left: 1px solid rgba(255, 255, 255, 0.08); z-index: 2000; transition: right 0.3s ease; padding: 25px; display: flex; flex-direction: column; }
        .cart-sidebar.open { right: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .close-cart { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; background: var(--bg-card); padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .cart-total { border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 20px; }
        .total-row { display: flex; justify-content: space-between; font-size: 18px; font-weight: 600; margin-bottom: 15px; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">NEXUS<span>SHOP</span></a>
        <div class="nav-actions">
            <button class="icon-btn" id="openCartBtn">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <section class="hero">
        <h1>Produtos <span>Premium</span></h1>
        <p>Sua nova plataforma de vendas rápida, bonita e responsiva.</p>
    </section>

    <main class="products-section">
        <div class="products-grid" id="productsGrid"></div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3>Seu Carrinho (<span id="cartCount">0</span>)</h3>
            <button class="close-cart" id="closeCartBtn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-total">
            <div class="total-row">
                <span>Total:</span>
                <span id="cartTotalValue">R$ 0,00</span>
            </div>
            <button class="btn-buy" style="background: linear-gradient(45deg, var(--primary), var(--secondary));" onclick="checkout()">Finalizar Compra</button>
        </div>
    </div>

    <script>
        const produtos = [
            { id: 1, title: "Fone Wireless Pro", price: 149.90 },
            { id: 2, title: "Smartwatch Quantum", price: 249.00 },
            { id: 3, title: "Teclado Mecânico RGB", price: 89.90 }
        ];

        let carrinho = [];

        const productsGrid = document.getElementById('productsGrid');
        const cartSidebar = document.getElementById('cartSidebar');
        const openCartBtn = document.getElementById('openCartBtn');
        const closeCartBtn = document.getElementById('closeCartBtn');
        const cartItemsContainer = document.getElementById('cartItemsContainer');
        const cartBadge = document.getElementById('cartBadge');
        const cartCount = document.getElementById('cartCount');
        const cartTotalValue = document.getElementById('cartTotalValue');

        function renderProdutos() {
            productsGrid.innerHTML = produtos.map(p => `
                <div class="product-card">
                    <h3 class="product-title">${p.title}</h3>
                    <span class="product-price">R$ ${p.price.toFixed(2).replace('.', ',')}</span>
                    <button class="btn-buy" onclick="adicionarAoCarrinho(${p.id})">Adicionar</button>
                </div>
            `).join('');
        }

        function toggleCart() { cartSidebar.classList.toggle('open'); }

        function adicionarAoCarrinho(id) {
            const produto = produtos.find(p => p.id === id);
            carrinho.push(produto);
            atualizarCarrinho();
        }

        function removerDoCarrinho(index) {
            carrinho.splice(index, 1);
            atualizarCarrinho();
        }

        function atualizarCarrinho() {
            cartBadge.textContent = carrinho.length;
            cartCount.textContent = carrinho.length;
            const total = carrinho.reduce((sum, item) => sum + item.price, 0);
            cartTotalValue.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;

            if (carrinho.length === 0) {
                cartItemsContainer.innerHTML = `<p style="text-align:center; color:var(--text-muted); margin-top:20px;">Carrinho vazio.</p>`;
            } else {
                cartItemsContainer.innerHTML = carrinho.map((item, index) => `
                    <div class="cart-item">
                        <div>
                            <h4>${item.title}</h4>
                            <span>R$ ${item.price.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <button style="background:none; border:none; color:#ef4444; cursor:pointer;" onclick="removerDoCarrinho(${index})">Remover</button>
                    </div>
                `).join('');
            }
        }

        function checkout() {
            if (carrinho.length === 0) return alert("Carrinho vazio!");
            alert("Compra simulada com sucesso!");
            carrinho = [];
            atualizarCarrinho();
            toggleCart();
        }

        openCartBtn.addEventListener('click', toggleCart);
        closeCartBtn.addEventListener('click', toggleCart);
        renderProdutos();
        atualizarCarrinho();
    </script>
</body>
</html>
